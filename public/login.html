<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - Exotic Pets Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .auth-wrapper {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .auth-box {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .auth-tabs {
      display: flex;
      border-bottom: 2px solid #e5e7eb;
    }
    .auth-tab {
      flex: 1;
      padding: 18px;
      background: none;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .auth-tab.active {
      color: #2563eb;
      border-bottom-color: #2563eb;
    }
    .auth-panel {
      display: none;
      padding: 40px;
    }
    .auth-panel.active {
      display: block;
    }
    .auth-panel h2 {
      font-size: 1.6rem;
      color: #111827;
      margin-bottom: 6px;
    }
    .auth-subtitle {
      color: #6b7280;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }
    .auth-field {
      margin-bottom: 18px;
    }
    .auth-field label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .auth-field input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .auth-field input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .auth-submit {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
      font-family: inherit;
    }
    .auth-submit:hover { background: #1d4ed8; }
    .auth-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #15803d;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-switch {
      text-align: center;
      margin-top: 20px;
      color: #6b7280;
      font-size: 0.9rem;
    }
    .switch-btn {
      background: none;
      border: none;
      color: #2563eb;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0;
      font-family: inherit;
    }
    .switch-btn:hover { text-decoration: underline; }
  </style>
</head>
<body data-page="login">
  <header class="navbar">
    <div class="logo">
      <img src="/images/logo.png" alt="Critter Kingdom" class="logo-img" style="height:44px;width:auto;" onload="this.nextElementSibling.style.display='none'" onerror="this.style.display='none'" />
      <span class="logo-text">Critter Kingdom</span>
    </div>
    <nav class="nav-links">
      <a href="/">Products</a>
      <a href="/care-guide">Care Guide</a>
      <a href="/cart">Cart (<span id="cart-count">0</span>)</a>
    </nav>
  </header>

  <main class="main">
    <div class="auth-wrapper">
      <div class="auth-box">

        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" onclick="switchTab('register')" id="register-tab-btn">Create Account</button>
        </div>

        <!-- Login Panel -->
        <div class="auth-panel active" id="login-panel">
          <h2>Welcome back</h2>
          <p class="auth-subtitle">Sign in to your account to continue shopping.</p>
          <div class="auth-error" id="login-error"></div>
          <div class="auth-success" id="login-success"></div>
          <div class="auth-field">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" placeholder="you@example.com" />
          </div>
          <div class="auth-field">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••" />
          </div>
          <button class="auth-submit" id="login-btn">Sign In</button>
          <p class="auth-switch">Don't have an account? <button class="switch-btn" onclick="switchTab('register')">Create one</button></p>
        </div>

        <!-- Register Panel -->
        <div class="auth-panel" id="register-panel">
          <h2>Create an account</h2>
          <p class="auth-subtitle">Join us to start shopping for exotic pets.</p>
          <div class="auth-error" id="register-error"></div>
          <div class="auth-success" id="register-success"></div>
          <div class="auth-field">
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" placeholder="Your name" />
          </div>
          <div class="auth-field">
            <label for="reg-email">Email Address</label>
            <input type="email" id="reg-email" placeholder="you@example.com" />
          </div>
          <div class="auth-field">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="At least 6 characters" />
          </div>
          <div class="auth-field">
            <label for="reg-confirm">Confirm Password</label>
            <input type="password" id="reg-confirm" placeholder="Re-enter password" />
          </div>
          <button class="auth-submit" id="register-btn">Create Account</button>
          <p class="auth-switch">Already have an account? <button class="switch-btn" onclick="switchTab('login')">Sign in</button></p>
        </div>

      </div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Exotic Pets Store. Created by Mollie, Megha, Abizar, Danny, and Jivitesh.</p>
  </footer>

  <script>
    // Tab switching
    function switchTab(tab) {
      document.getElementById('login-panel').classList.toggle('active', tab === 'login');
      document.getElementById('register-panel').classList.toggle('active', tab === 'register');
      document.querySelectorAll('.auth-tab').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
    }

    // Show/hide message helpers
    function showMsg(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
      el.className = type === 'error' ? 'auth-error' : 'auth-success';
      el.style.display = 'block';
    }
    function hideMsg(id) { document.getElementById(id).style.display = 'none'; }

    // Login
    document.getElementById('login-btn').addEventListener('click', async () => {
      hideMsg('login-error'); hideMsg('login-success');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showMsg('login-error', 'Please fill in all fields.', 'error');
      try {
        const res = await fetch('/B_login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!data.success) return showMsg('login-error', data.message || 'Invalid email or password.', 'error');
        sessionStorage.setItem('user', JSON.stringify(data.user));
        showMsg('login-success', `Welcome back, ${data.user.name}! Redirecting...`, 'success');
        setTimeout(() => window.location.href = '/', 1200);
      } catch (e) {
        showMsg('login-error', 'Something went wrong. Try again.', 'error');
      }
    });

    // Register
    document.getElementById('register-btn').addEventListener('click', async () => {
      hideMsg('register-error'); hideMsg('register-success');
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      if (!name || !email || !password || !confirm) return showMsg('register-error', 'Please fill in all fields.', 'error');
      if (password !== confirm) return showMsg('register-error', 'Passwords do not match.', 'error');
      if (password.length < 6) return showMsg('register-error', 'Password must be at least 6 characters.', 'error');
      try {
        const res = await fetch('/B_register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!data.success) return showMsg('register-error', data.message || 'Registration failed.', 'error');
        sessionStorage.setItem('user', JSON.stringify(data.user));
        showMsg('register-success', `Account created! Welcome, ${data.user.name}! Redirecting...`, 'success');
        setTimeout(() => window.location.href = '/', 1200);
      } catch (e) {
        showMsg('register-error', 'Something went wrong. Try again.', 'error');
      }
    });

    // Footer year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Cart count
    fetch('/B_getcartcount').then(r => r.json()).then(d => {
      const el = document.getElementById('cart-count');
      if (el) el.textContent = d.count ?? 0;
    }).catch(() => {});
  </script>
</body>
</html>
